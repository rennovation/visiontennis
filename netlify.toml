# netlify.toml
# Configuração do projeto Tennis Vision no Netlify

[build]
  publish = "."                        # pasta raiz com o HTML
  functions = "netlify/functions"      # pasta das funções serverless

# Redireciona /api/analyze para a Netlify Function
[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

# Headers de segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
